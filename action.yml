---
name: Setup oneAPI
# TODO Review by
# https://github.com/neelravi/intel-oneapi-github-actions/blob/main/action.yml
branding:
  color: blue
  icon: terminal
inputs:
  cache:
    required: false
    description: If caching should be used
    default: true
  components:
    description: >-
      Space-separated list of Intel OneAPI components to install (e.g.
      fortran cpp mpi mkl basekit hpckit)
    required: false
    default: cpp
  key-prefix:
    required: false
    description: Add prefix to cache key (for refresh or identification)
  verbose:
    required: false
    description: Show version and location `icx` & `icpx` form PATH.
    default: false
  version:
    required: false
    description: A specific version to install.
runs:
  using: composite
  steps:
    - name: Check OS
      if: runner.os != 'Linux'
      shell: bash
      run: |
        echo "${{ runner.os }}: unimplemented"
        false

    - name: oneAPI directory and key
      id: _
      shell: bash
      run: |
        key="oneAPI_${{ inputs.version }}_${{ inputs.components }}_0.1"
        echo "key=$key" >> $GITHUB_OUTPUT
        echo path=/opt/intel/oneapi >> $GITHUB_OUTPUT

    - name: Restore cached oneAPI directory
      id: cache
      uses: actions/cache/restore@v5
      with:
        key: ${{ steps._.outputs.key }}
        path: ${{ steps._.outputs.path }}

    - name: Install oneAPI
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # oneapi_setup_apt_repo_linux.sh
        #
        # This script sets up the Intel oneAPI apt repository on a Linux system.
        # https://www.intel.com/content/www/us/en/docs/oneapi/installation-guide-linux/2025-1/base-apt.html#BASE-APT
        #
        I="https://apt.repos.intel.com"
        curl -sS \
          -L $I/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
          | gpg --dearmor \
          | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null

        echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg]" \
             " $I/oneapi all main" \
          | sudo tee /etc/apt/sources.list.d/oneAPI.list

        sudo apt-get update \
          -o Dir::Etc::sourcelist="sources.list.d/oneAPI.list" \
          -o APT::Get::List-Cleanup="0"

        # Install
        vsfx="${{ inputs.version }}"
        if [ -n "$vsfx" ] ; then
          vsfx="-$vsfx"
        fi
        apt_install() {
          sudo apt-get install -y --no-install-recommends "$1$vsfx"
        }
        for c in ${{ inputs.components }} ; do
          case $c in
            basekit)
              apt_install intel-basekit
              ;;
            hpckit)
              apt_install intel-hpckit
              ;;
            fortran)
              apt_install intel-oneapi-compiler-fortran
              ;;
            cpp)
              apt_install intel-oneapi-compiler-dpcpp-cpp
              ;;
            mpi)
              apt_install intel-oneapi-mpi
              ;;
            mkl)
              apt_install intel-oneapi-mkl
              ;;
            *)
              echo "Unknown component: $component"
              false
              ;;
          esac
        done

    - name: Exclude unused files from cache
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # oneapi_cache_exclude_linux.sh
        #
        LATEST_VERSION=$(ls -1 "${{ steps._.outputs.path }}/compiler/" | \
                         grep -v latest | sort | tail -1)
        unneeded="compiler/lib/ia32_lin
                  bin/ia32
                  lib/emu
                  lib/oclfpga"
        for u in $unneeded ; do
          sudo rm -rf \
            "${{ steps._.outputs.path }}/compiler/$LATEST_VERSION/linux/$u"
        done

    - name: Save cached oneAPI directory
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        key: ${{ steps._.outputs.key }}
        path: ${{ steps._.outputs.path }}

    - name: Setup Intel oneAPI environment
      shell: bash
      run: |
        printenv | sort > /tmp/base
        source "${{ steps._.outputs.path }}/setvars.sh"
        printenv | sort | diff /tmp/base - \
          | sed -n '/^> /s///p' >> $GITHUB_ENV

        if ${{ fromJSON(inputs.verbose) }} ; then
          printenv | sort | diff -u /tmp/base - || true
        fi

    - name: Show version
      if: ${{ fromJSON(inputs.verbose) }}
      shell: bash
      run: |
        echo "ONEAPI_ROOT=$ONEAPI_ROOT"
        type icx
        icx --version
        type icpx
        icpx --version
